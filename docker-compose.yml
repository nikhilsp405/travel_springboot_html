version: "3.8"

services:

  db:
    image: postgres:14
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  backend:
    build: ./springboot-app
    ports:
      - "8081:8080"
    depends_on:
      - db

  frontend:
    build: ./frontend-html
    ports:
      - "3000:80"
